name: Lint & Code Quality

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint --if-present || echo "Lint script not found"
      
      - name: Check formatting (Prettier)
        run: npm run format:check --if-present || echo "Format check script not found"
      
      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
